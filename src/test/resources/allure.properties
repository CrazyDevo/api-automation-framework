# Directory where Allure will store raw results
allure.results.directory=target/allure-results

# Optional: Directory for generated report (used by some tools)
allure.report.directory=target/allure-report

# Link patterns (optional but useful for real projects)
#allure.link.issue.pattern=https://jira.yourcompany.com/browse/{}
#allure.link.tms.pattern=https://testcase.yourcompany.com/{}

# Environment support
allure.environment=qa

# Categories file (optional for defect grouping)
#allure.categories.file=src/test/resources/categories.json